name: Claude Code Action Official
on:
  issue_comment:
    types: [created]

jobs:
  run-claude:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: anthropics/claude-code-action@c7d609261ba189a1b88efd790853001aa9640e1d
        with:
          trigger_phrase: "@claude"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

# This workflow will triage pull requests and apply a label based on the
# paths that are modified in the pull request.
#
# To use this workflow, you will need to set up a .github/labeler.yml
# file with configuration.  For more information, see:
# https://github.com/actions/labeler

name: PR and Issue Labeler
on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [edited, closed, opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  labeler:
    name: Apply labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const item = context.payload.issue || context.payload.pull_request;
            const title = item.title.toLowerCase();

            const labels = [];

            if (title.includes("deps")) labels.push("dependencies");
            if (title.includes("chore")) labels.push("chore");
            if (title.includes("fix")) labels.push("fixed");
            if (title.includes("feat")) labels.push("feature");
            if (title.includes("enode")) labels.push("enode");
            if (title.includes("graphql")) labels.push("graphql");
            if (title.includes("price")) labels.push("prices");
            if (title.includes("sensor")) labels.push("sensor");
            if (title.includes("number")) labels.push("number");
            if (title.includes("breaking")) labels.push("breaking-change");

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: item.number,
                labels,
              });
            }
      - name: Apply labels
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 #v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Size label
        uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9 #v1
        with:
          xs_label: size/xs
          xs_max_size: 10
          s_label: size/s
          s_max_size: 50
          m_label: size/m
          m_max_size: 200
          l_label: size/l
          l_max_size: 500
          xl_label: size/xl

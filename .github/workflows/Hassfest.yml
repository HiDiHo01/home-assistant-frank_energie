name: Hassfest validation

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request: ~
  schedule:
    - cron: "0 0 * * 6"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate
    steps:
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
        with:
          category: integration
